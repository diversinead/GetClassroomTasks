services:
  schoolhub:
    build: .
    container_name: schoolhub
    ports:
      - "8080:8080"
    volumes:
      - ./Assessments:/app/Assessments
      - ./Homework:/app/Homework
      - ./TodoLists:/app/TodoLists
      - ./StudyNotes:/app/StudyNotes
    environment:
      - TZ=Australia/Melbourne
    restart: unless-stopped
